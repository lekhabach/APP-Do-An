<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A5EB0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bách Review">
  <title>Bách Review Đồ Ăn Hải Phòng</title>
  <link rel="manifest" href="manifest.json">

  <!-- Inter Font (system fallback nếu offline) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Routing Machine -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>

  <!-- App CSS -->
  <link rel="stylesheet" href="css/retro.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====================================================== -->
  <!-- SCREEN 1: WELCOME                                       -->
  <!-- ====================================================== -->
  <div id="screen-welcome" class="screen screen-welcome active">
    <div class="welcome-content">
      <div class="welcome-logo">
        <img src="assets/Logo_moi.png" alt="Logo Hải Phòng" class="city-logo">
      </div>
      <h1 class="welcome-title">Bách Review</h1>
      <h2 class="welcome-subtitle">Đồ ăn Hải Phòng</h2>
      <div class="welcome-divider-line"></div>
      <p class="welcome-tagline">Khám phá ẩm thực thành phố hoa phượng</p>
      <button id="btn-start" class="btn-primary btn-welcome">
        Bắt đầu khám phá
      </button>
    </div>
  </div>

  <!-- ====================================================== -->
  <!-- SCREEN 2: MAIN (MAP + DANH SÁCH)                       -->
  <!-- ====================================================== -->
  <div id="screen-main" class="screen screen-main">

    <!-- Header -->
    <header class="app-header">
      <div class="header-brand">
        <img src="assets/Logo_moi.png" alt="Logo" class="header-logo">
        <span class="header-title">Bách Review</span>
      </div>
      <div class="header-actions">
        <button id="btn-locate" class="header-btn" title="Vị trí của tôi">📍</button>
      </div>
    </header>

    <!-- Map -->
    <div id="map"></div>

    <!-- Bottom Drawer: Danh sách quán ăn -->
    <div id="restaurant-drawer" class="bottom-drawer">
      <div class="drawer-handle-bar" id="drawer-handle">
        <div class="drawer-handle-indicator"></div>
        <div class="drawer-handle-row">
          <span class="drawer-title">Danh sách quán ăn</span>
          <button class="btn-drawer-collapse" id="btn-collapse-drawer" title="Thu nhỏ">▾</button>
        </div>
      </div>
      <div class="drawer-content">
        <div id="restaurant-list" class="restaurant-list">
          <div class="loading-state">
            <p>Đang tải dữ liệu...</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- ====================================================== -->
  <!-- OVERLAY: Chi tiết quán ăn                              -->
  <!-- ====================================================== -->
  <div id="detail-sheet" class="detail-sheet hidden">
    <div class="detail-backdrop" id="detail-backdrop"></div>
    <div class="detail-card">
      <button class="detail-close" id="detail-close">✕</button>
      <h2 class="detail-name" id="detail-name">Tên quán</h2>
      <div class="detail-body">
        <div class="detail-row" id="detail-phone-row">
          <span class="detail-icon">📞</span>
          <a class="detail-phone" id="detail-phone" href="#">---</a>
        </div>
        <div class="detail-row">
          <span class="detail-icon">💰</span>
          <span class="detail-price" id="detail-price">---</span>
        </div>
        <div class="detail-row" id="detail-address-row">
          <span class="detail-icon">📍</span>
          <span class="detail-address" id="detail-address">---</span>
        </div>
      </div>
      <div class="detail-actions">
        <button class="btn-route-inapp" id="btn-route-inapp">
          🗺️&nbsp; Chỉ đường trong app
        </button>
        <button class="btn-route-gmaps" id="btn-route-gmaps">
          🔗&nbsp; Mở Google Maps
        </button>
      </div>
    </div>
  </div>

  <!-- ====================================================== -->
  <!-- PANEL: Thông tin chỉ đường                             -->
  <!-- ====================================================== -->
  <div id="routing-panel" class="routing-panel hidden">
    <div class="routing-header">
      <button id="btn-clear-route" class="btn-clear-route">← Xóa</button>
      <span class="routing-dest" id="routing-dest">Đang tính...</span>
    </div>
    <div class="routing-info">
      <span class="routing-distance" id="routing-distance">-- km</span>
      <span class="routing-sep"> · </span>
      <span class="routing-time" id="routing-time">-- phút</span>
    </div>
  </div>

  <!-- Toast thông báo -->
  <div id="toast" class="toast hidden">
    <span id="toast-msg"></span>
  </div>

  <!-- App JS -->
  <script src="js/data.js"></script>
  <script src="js/map.js"></script>
  <script src="js/routing.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
